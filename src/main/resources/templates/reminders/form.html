<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Reminder - UniSchedule</title>
    <th:block th:replace="~{layout :: styles}"></th:block>
</head>
<body>
    <nav>
        <a href="/students">Students</a>
    </nav>
    <div class="container">
        <h1>Add Reminder</h1>
        <form th:action="@{/students/{id}/reminders(id=${studentId})}" th:object="${reminder}" method="post">
            <div class="form-group">
                <label>Message</label>
                <input type="text" th:field="*{message}" required />
            </div>
            <div class="form-group">
                <label>Due Date &amp; Time</label>
                <input type="datetime-local" th:field="*{dueDateTime}" required />
            </div>
            <button type="submit" class="btn">Save Reminder</button>
            <a th:href="@{/students/{id}/reminders(id=${studentId})}" class="btn" style="background:#888;">Cancel</a>
        </form>
    </div>
</body>
</html>
