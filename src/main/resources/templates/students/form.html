<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Student - UniSchedule</title>
    <th:block th:replace="~{layout :: styles}"></th:block>
</head>
<body>
    <nav>
        <a href="/students">Students</a>
    </nav>
    <div class="container">
        <h1>Add Student</h1>
        <form th:action="@{/students}" th:object="${student}" method="post">
            <div class="form-group">
                <label>Name</label>
                <input type="text" th:field="*{name}" required />
            </div>
            <div class="form-group">
                <label>Registration Number</label>
                <input type="text" th:field="*{registrationNumber}" required />
            </div>
            <div class="form-group">
                <label>Course</label>
                <input type="text" th:field="*{course}" />
            </div>
            <button type="submit" class="btn">Save Student</button>
            <a href="/students" class="btn" style="background:#888;">Cancel</a>
        </form>
    </div>
</body>
</html>
